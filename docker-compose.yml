services:

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: analytics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       analytics
      POSTGRES_USER:     analytics_user
      POSTGRES_PASSWORD: analytics_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U analytics_user -d analytics']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: analytics_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: analytics_kafka
    restart: unless-stopped
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID:                                  1
      KAFKA_PROCESS_ROLES:                            broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS:                 1@kafka:9093
      KAFKA_LISTENERS:                                PLAINTEXT://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS:                     PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:           PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES:                CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME:               PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:                'false'
      KAFKA_NUM_PARTITIONS:                           3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:         1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:            1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS:         0
      CLUSTER_ID:                                     'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: apache/kafka:latest
    container_name: analytics_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    restart: 'no'
    entrypoint: ['/bin/bash', '-c']
    command:
      - |
        echo "Creating Kafka topics..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic raw-events --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic processed-analytics --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic alerts --partitions 1 --replication-factor 1
        echo "Topics created successfully:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: analytics_kafka_ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '8081:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME:             local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: analytics_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - '3001:3001'
    environment:
      NODE_ENV:               development
      PORT:                   3001
      POSTGRES_HOST:          postgres
      POSTGRES_PORT:          5432
      POSTGRES_DB:            analytics
      POSTGRES_USER:          analytics_user
      POSTGRES_PASSWORD:      analytics_pass
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      KAFKA_BROKERS:          kafka:29092
      KAFKA_CLIENT_ID:        analytics-api
      JWT_SECRET:             dev_secret_replace_in_production_use_256_bit_random
      JWT_EXPIRES_IN:         15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN:            http://localhost:5173
    volumes:
      - ./server/src:/app/src
      - /app/node_modules
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  kafka_data: